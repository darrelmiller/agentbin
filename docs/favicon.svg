<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Two agent nodes connected by a line — representing A2A interop -->
  <!-- Left agent node -->
  <circle cx="8" cy="16" r="5" fill="#58a6ff" opacity="0.9"/>
  <circle cx="8" cy="14.5" r="1.8" fill="#0d1117"/>
  <rect x="5.5" y="17.5" width="5" height="3" rx="1.5" fill="#0d1117"/>
  <!-- Right agent node -->
  <circle cx="24" cy="16" r="5" fill="#3fb950" opacity="0.9"/>
  <circle cx="24" cy="14.5" r="1.8" fill="#0d1117"/>
  <rect x="21.5" y="17.5" width="5" height="3" rx="1.5" fill="#0d1117"/>
  <!-- Connection line with pulse dots -->
  <line x1="13" y1="16" x2="19" y2="16" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="2 1.5"/>
  <!-- Checkmark in center — test/validation -->
  <circle cx="16" cy="16" r="3.5" fill="#0d1117" stroke="#8b949e" stroke-width="0.8"/>
  <polyline points="14,16 15.5,17.5 18,14.5" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
