# HTTP server port (configurable via PORT env var)
quarkus.http.port=${PORT:5000}

# Serve all endpoints under /spec to match client test expectations
quarkus.http.root-path=/spec

# Base URL for agent cards (includes root-path)
agentbin.base-url=http://localhost:${quarkus.http.port}/spec

# CORS configuration
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,A2A-Version

# Logging
quarkus.log.level=INFO
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n

# Disable dev services
quarkus.devservices.enabled=false
